<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>英単語テスト app</title>
<style>
:root, [data-theme="light"] {
  --bg:#f6f5f1; --surface:#fffdfa; --surface-2:#f0ece5; --text:#1f1d1a; --muted:#6d675f;
  --primary:#0f766e; --primary-2:#115e59; --ok:#2f7d32; --ng:#b42318; --border:#d7d1c7;
  --shadow:0 12px 30px rgba(34,28,18,.08); --radius:22px;
}
[data-theme="dark"] {
  --bg:#161513; --surface:#201e1b; --surface-2:#2a2723; --text:#f2eee7; --muted:#b4aca2;
  --primary:#55b4ac; --primary-2:#7ad0c9; --ok:#79d27d; --ng:#ff8f84; --border:#433e38;
  --shadow:0 14px 36px rgba(0,0,0,.32);
}
* { box-sizing:border-box; }
html { -webkit-text-size-adjust:100%; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif; background:var(--bg); color:var(--text); }
button,input { font:inherit; }
.wrap { min-height:100dvh; padding:16px; display:flex; align-items:center; justify-content:center; }
.app { width:min(100%, 560px); background:var(--surface); border:1px solid var(--border); border-radius:28px; box-shadow:var(--shadow); overflow:hidden; }
.header { padding:18px 18px 12px; background:linear-gradient(180deg, color-mix(in srgb, var(--primary) 8%, var(--surface)) 0%, var(--surface) 100%); border-bottom:1px solid var(--border); }
.brand { display:flex; align-items:center; gap:12px; }
.logo { width:44px; height:44px; border-radius:14px; background:var(--primary); color:#fff; display:grid; place-items:center; flex:0 0 auto; }
.logo svg { width:24px; height:24px; }
.title { font-size:20px; font-weight:800; letter-spacing:.02em; }
.subtitle { margin-top:2px; color:var(--muted); font-size:13px; }
.headrow { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.iconbtn { min-width:44px; min-height:44px; border-radius:14px; border:1px solid var(--border); background:var(--surface); color:var(--text); }
.main { padding:18px; display:grid; gap:14px; }
.stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.stat { background:var(--surface-2); border:1px solid var(--border); border-radius:18px; padding:12px; }
.stat .k { color:var(--muted); font-size:12px; }
.stat .v { margin-top:4px; font-size:18px; font-weight:800; }
.card { border:1px solid var(--border); border-radius:24px; padding:18px; background:var(--surface); }
.label { color:var(--muted); font-size:12px; letter-spacing:.08em; font-weight:700; }
.word { margin-top:8px; font-size:clamp(32px,8vw,46px); line-height:1.08; font-weight:900; word-break:break-word; }
.help { margin-top:8px; color:var(--muted); font-size:13px; }
.inputbox { display:grid; gap:8px; }
.inputbox label { font-weight:700; font-size:14px; }
.inputbox input { width:100%; min-height:54px; padding:14px 16px; border:2px solid var(--border); border-radius:16px; background:var(--surface); color:var(--text); font-size:18px; }
.inputbox input:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 4px color-mix(in srgb, var(--primary) 16%, transparent); }
.btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn { min-height:50px; border:none; border-radius:16px; font-weight:800; }
.btn.primary { background:var(--primary); color:#fff; }
.btn.secondary { background:var(--surface-2); color:var(--text); border:1px solid var(--border); }
.btn.next { grid-column:1 / -1; background:var(--primary-2); color:#fff; }
.result { border-radius:18px; padding:14px; border:1px dashed var(--border); background:var(--surface-2); min-height:96px; }
.result.good { border-color:color-mix(in srgb, var(--ok) 45%, var(--border)); background:color-mix(in srgb, var(--ok) 10%, var(--surface)); }
.result.bad { border-color:color-mix(in srgb, var(--ng) 45%, var(--border)); background:color-mix(in srgb, var(--ng) 9%, var(--surface)); }
.result .status { font-weight:900; margin-bottom:6px; }
.result .status.good { color:var(--ok); }
.result .status.bad { color:var(--ng); }
.footer { padding:0 18px 18px; color:var(--muted); font-size:12px; }
.chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { padding:8px 12px; border-radius:999px; border:1px solid var(--border); background:var(--surface); font-size:12px; }
.summary { text-align:center; display:grid; gap:12px; }
.summary h2 { margin:0; font-size:28px; }
.summary p { margin:0; color:var(--muted); }
.hidden { display:none !important; }
@media (prefers-reduced-motion:no-preference) {
  .app, .btn, .iconbtn, input { transition:.18s ease; }
  .btn:active, .iconbtn:active { transform:translateY(1px) scale(.99); }
}
</style>
</head>
<body>
<div class="wrap">
  <main class="app" aria-label="英単語テストアプリ">
    <section class="header">
      <div class="headrow">
        <div class="brand">
          <div class="logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 4.5h9a3 3 0 0 1 3 3V19l-4-2-4 2-4-2V7.5a3 3 0 0 1 3-3Z"></path>
              <path d="M9 8h4"></path>
              <path d="M9 11h6"></path>
            </svg>
          </div>
          <div>
            <div class="title">英単語テスト</div>
            <div class="subtitle">英語を見て、日本語がわかるかを確認</div>
          </div>
        </div>
        <button class="iconbtn" id="themeBtn" aria-label="テーマ切替">☀️</button>
      </div>
    </section>

    <section class="main" id="quizView">
      <div class="stats">
        <div class="stat"><div class="k">問題</div><div class="v" id="progress">1 / 1</div></div>
        <div class="stat"><div class="k">正解</div><div class="v" id="score">0</div></div>
        <div class="stat"><div class="k">回答</div><div class="v" id="answered">0</div></div>
      </div>

      <div class="card">
        <div class="label">ENGLISH</div>
        <div class="word" id="word">word</div>
        <div class="help">日本語を入力して「答え合わせ」を押してください。</div>
      </div>

      <div class="inputbox">
        <label for="answerInput">日本語を書く</label>
        <input id="answerInput" type="text" inputmode="text" autocomplete="off" placeholder="例：学校">
      </div>

      <div class="btns">
        <button class="btn primary" id="checkBtn">答え合わせ</button>
        <button class="btn secondary" id="showBtn">正解を見る</button>
        <button class="btn next" id="nextBtn">次の問題へ</button>
      </div>

      <div class="result" id="result" aria-live="polite">
        <div class="status">ここに結果が出ます。</div>
        <div>正解例もここに表示されます。</div>
      </div>

      <div class="chips">
        <div class="chip">全 119 問</div>
        <div class="chip">1問ずつ表示</div>
        <div class="chip">正解表示つき</div>
        <div class="chip">スマホ向け大きめボタン</div>
      </div>
    </section>

    <section class="main hidden" id="endView">
      <div class="summary">
        <h2>おつかれさま！</h2>
        <p id="finalText"></p>
        <button class="btn primary" id="restartBtn">もう一回やる</button>
      </div>
    </section>

    <div class="footer">答えは少しゆるめに判定しますが、必ず正解例も表示します。</div>
  </main>
</div>

<script>
const vocab = [{"en": "eleven", "ja": "11(の)"}, {"en": "twelve", "ja": "12(の)"}, {"en": "thirteen", "ja": "13(の)"}, {"en": "fourteen", "ja": "14(の)"}, {"en": "fifteen", "ja": "15(の)"}, {"en": "sixteen", "ja": "16(の)"}, {"en": "seventeen", "ja": "17(の)"}, {"en": "eighteen", "ja": "18(の)"}, {"en": "I", "ja": "私は[が]"}, {"en": "my", "ja": "私の"}, {"en": "me", "ja": "私を[に]"}, {"en": "you", "ja": "あなた(たち)は[が]"}, {"en": "fan", "ja": "ファン"}, {"en": "friend", "ja": "友達"}, {"en": "everyone", "ja": "みなさん、みんな、だれでも"}, {"en": "classmate", "ja": "同級生"}, {"en": "math", "ja": "数学"}, {"en": "science", "ja": "科学、理科"}, {"en": "English", "ja": "英語"}, {"en": "Japanese", "ja": "国語(の)、日本語(の)"}, {"en": "art", "ja": "芸術、美術"}, {"en": "club", "ja": "クラブ、部"}, {"en": "lesson", "ja": "授業、レッスン"}, {"en": "school", "ja": "学校"}, {"en": "great", "ja": "すばらしい、とても楽しい"}, {"en": "soft", "ja": "やわらかい"}, {"en": "low", "ja": "(高さ・位置などが)低い"}, {"en": "high", "ja": "高い"}, {"en": "often", "ja": "しばしば、よく"}, {"en": "now", "ja": "今、現在は、今では、今すぐ"}, {"en": "fast", "ja": "速く"}, {"en": "always", "ja": "いつも、常に"}, {"en": "call", "ja": "…を(…と)呼ぶ、名づける"}, {"en": "join", "ja": "…に加わる、参加する"}, {"en": "love", "ja": "…が大好きである、…を愛している"}, {"en": "watch", "ja": "…を(注意して)見る"}, {"en": "draw", "ja": "(線画)をかく"}, {"en": "take", "ja": "…を利用する、…を受ける"}, {"en": "sing", "ja": "(…を)歌う"}, {"en": "cook", "ja": "(…を)料理する"}, {"en": "anime", "ja": "(日本の)アニメ"}, {"en": "comic", "ja": "マンガ"}, {"en": "game", "ja": "遊び、ゲーム"}, {"en": "fishing", "ja": "魚つり"}, {"en": "hiking", "ja": "ハイキング"}, {"en": "reading", "ja": "読書、読むこと"}, {"en": "shopping", "ja": "買い物"}, {"en": "activity", "ja": "活動"}, {"en": "home", "ja": "家庭、家"}, {"en": "store", "ja": "店、商店"}, {"en": "shrine", "ja": "神社"}, {"en": "stadium", "ja": "スタジアム、競技場"}, {"en": "office", "ja": "事務所、役所"}, {"en": "bus stop", "ja": "バス停"}, {"en": "supermarket", "ja": "スーパーマーケット"}, {"en": "cute", "ja": "かわいい"}, {"en": "strong", "ja": "強い、じょうぶな"}, {"en": "sour", "ja": "酸っぱい"}, {"en": "bitter", "ja": "苦い"}, {"en": "fresh", "ja": "新鮮な"}, {"en": "spicy", "ja": "香辛料のきいた、辛い"}, {"en": "thirsty", "ja": "のどのかわいた"}, {"en": "delicious", "ja": "とてもおいしい"}, {"en": "food", "ja": "食べ物"}, {"en": "lunch", "ja": "昼食"}, {"en": "lemon", "ja": "レモン"}, {"en": "cherry", "ja": "さくらんぼ"}, {"en": "cake", "ja": "ケーキ"}, {"en": "sweet", "ja": "あまい菓子、キャンディー"}, {"en": "parfait", "ja": "パフェ"}, {"en": "sandwich", "ja": "サンドイッチ"}, {"en": "knee", "ja": "ひざ"}, {"en": "leg", "ja": "脚"}, {"en": "neck", "ja": "首"}, {"en": "hair", "ja": "髪"}, {"en": "nose", "ja": "鼻"}, {"en": "tooth", "ja": "歯"}, {"en": "head", "ja": "頭"}, {"en": "mouth", "ja": "口"}, {"en": "cool", "ja": "かっこいい"}, {"en": "new", "ja": "新しい、新任の"}, {"en": "old", "ja": "古い"}, {"en": "welcome", "ja": "歓迎された"}, {"en": "some", "ja": "いくつかの、いくらかの"}, {"en": "very", "ja": "非常に、[否定文で]あまり(…でない)"}, {"en": "well", "ja": "じょうずに、うまく、よく"}, {"en": "usually", "ja": "たいてい、ふつう"}, {"en": "tea", "ja": "茶、紅茶"}, {"en": "juice", "ja": "ジュース"}, {"en": "coffee", "ja": "コーヒー"}, {"en": "beef", "ja": "牛肉"}, {"en": "cheese", "ja": "チーズ"}, {"en": "bread", "ja": "パン、食パン"}, {"en": "rice", "ja": "米、稲、ご飯"}, {"en": "cooking", "ja": "料理、料理法"}, {"en": "team", "ja": "チーム、組"}, {"en": "student", "ja": "学生、生徒"}, {"en": "teacher", "ja": "先生、教師"}, {"en": "textbook", "ja": "教科書"}, {"en": "notebook", "ja": "ノート"}, {"en": "library", "ja": "図書館、図書室"}, {"en": "classroom", "ja": "教室"}, {"en": "swimming pool", "ja": "(水泳用の)プール"}, {"en": "parent", "ja": "親、[parentsで]親たち、両親"}, {"en": "father", "ja": "父、お父さん"}, {"en": "mother", "ja": "母、お母さん"}, {"en": "sister", "ja": "姉、妹、姉妹"}, {"en": "brother", "ja": "兄、弟、兄弟"}, {"en": "cousin", "ja": "いとこ"}, {"en": "grandfather", "ja": "祖父"}, {"en": "grandmother", "ja": "祖母"}, {"en": "white", "ja": "白(い)"}, {"en": "black", "ja": "黒(い)"}, {"en": "red", "ja": "赤(い)"}, {"en": "blue", "ja": "青(い)"}, {"en": "pink", "ja": "ピンク(色の)"}, {"en": "purple", "ja": "紫(色の)"}, {"en": "yellow", "ja": "黄色(い)"}, {"en": "color", "ja": "色、色彩"}];
const el = (id) => document.getElementById(id);
const wordEl = el('word');
const progressEl = el('progress');
const scoreEl = el('score');
const answeredEl = el('answered');
const inputEl = el('answerInput');
const resultEl = el('result');
const quizView = el('quizView');
const endView = el('endView');
const finalText = el('finalText');

let deck = [];
let index = 0;
let score = 0;
let answered = 0;
let locked = false;

function applyTheme(mode) {
  document.documentElement.setAttribute('data-theme', mode);
  el('themeBtn').textContent = mode === 'dark' ? '🌙' : '☀️';
}
applyTheme(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
el('themeBtn').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  applyTheme(next);
});

function shuffle(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function normalize(text) {
  return (text || '')
    .toString()
    .trim()
    .replace(/[　\s]+/g, '')
    .replace(/[\[［][^\]］]*[\]］]/g, '')
    .replace(/[（(]([^）)]*)[）)]/g, '$1')
    .replace(/[、,，。．・…\-ー]/g, '')
    .replace(/[!?！？]/g, '')
    .toLowerCase();
}

function variantsFromPart(part) {
  const set = new Set();
  let base = (part || '').replace(/[\[［][^\]］]*[\]］]/g, '').trim();
  if (!base) return [];
  set.add(base);
  set.add(base.replace(/[（(]([^）)]*)[）)]/g, '$1'));
  set.add(base.replace(/[（(]([^）)]*)[）)]/g, ''));
  for (const item of [...set]) {
    set.add(item.replace(/^([をにがはの]|です|で)+/, ''));
    set.add(item.replace(/([をにがはの])$/, ''));
  }
  return [...set].map(normalize).filter(Boolean);
}

function answerCandidates(ja) {
  const parts = ja.split(/[、,，]/).map(s => s.trim()).filter(Boolean);
  const set = new Set();
  for (const p of parts) {
    for (const v of variantsFromPart(p)) set.add(v);
  }
  return [...set];
}

function renderQuestion() {
  if (index >= deck.length) return finish();
  const item = deck[index];
  wordEl.textContent = item.en;
  progressEl.textContent = `${index + 1} / ${deck.length}`;
  scoreEl.textContent = score;
  answeredEl.textContent = answered;
  inputEl.value = '';
  locked = false;
  inputEl.disabled = false;
  resultEl.className = 'result';
  resultEl.innerHTML = '<div class="status">ここに結果が出ます。</div><div>正解例もここに表示されます。</div>';
  setTimeout(() => inputEl.focus(), 50);
}

function showResult(ok, userText, revealedOnly=false) {
  const item = deck[index];
  resultEl.className = 'result ' + (ok ? 'good' : 'bad');
  const statusText = revealedOnly ? '正解を表示しました' : ok ? '正解！' : 'おしい / ちがう';
  const statusClass = ok ? 'good' : 'bad';
  const your = userText ? `<div>あなたの答え：${escapeHtml(userText)}</div>` : '<div>あなたの答え：未入力</div>';
  resultEl.innerHTML = `
    <div class="status ${statusClass}">${statusText}</div>
    ${your}
    <div>正解例：<strong>${escapeHtml(item.ja)}</strong></div>
  `;
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function checkAnswer() {
  if (locked) return;
  const item = deck[index];
  const value = inputEl.value.trim();
  const user = normalize(value);
  if (!user) {
    showResult(false, '', false);
    return;
  }
  const candidates = answerCandidates(item.ja);
  const ok = candidates.includes(user);
  locked = true;
  inputEl.disabled = true;
  answered += 1;
  if (ok) score += 1;
  scoreEl.textContent = score;
  answeredEl.textContent = answered;
  showResult(ok, value, false);
}

function revealAnswer() {
  if (!locked) {
    answered += 1;
    answeredEl.textContent = answered;
  }
  locked = true;
  inputEl.disabled = true;
  showResult(false, inputEl.value.trim(), true);
}

function nextQuestion() {
  index += 1;
  renderQuestion();
}

function finish() {
  quizView.classList.add('hidden');
  endView.classList.remove('hidden');
  finalText.textContent = `${deck.length}問中 ${score}問正解。`; 
}

function restart() {
  deck = shuffle(vocab);
  index = 0;
  score = 0;
  answered = 0;
  quizView.classList.remove('hidden');
  endView.classList.add('hidden');
  renderQuestion();
}

el('checkBtn').addEventListener('click', checkAnswer);
el('showBtn').addEventListener('click', revealAnswer);
el('nextBtn').addEventListener('click', nextQuestion);
el('restartBtn').addEventListener('click', restart);
inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') checkAnswer(); });
restart();
</script>
</body>
</html>
